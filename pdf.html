<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Text to PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --bg1:#6a5cff;
  --bg2:#8b7bff;
  --card-border:rgba(255,255,255,0.9);
  --card-shadow:
    0 0 0 1px rgba(255,255,255,0.22),
    0 18px 35px rgba(0,0,0,0.18),
    0 28px 70px rgba(0,0,0,0.28),
    0 8px 18px rgba(103,79,255,0.18);
  --text:#141b2d;
  --muted:#667085;
  --line:#e8e6f5;
  --primary:#6a5cff;
  --green1:#a7f06b;
  --green2:#7dffb2;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.22), transparent 18%),
    radial-gradient(circle at top right, rgba(255,255,255,0.14), transparent 20%),
    linear-gradient(135deg, var(--bg1), var(--bg2));
  min-height:100vh;
}

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding:16px;
}

.sticky-topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  width:100%;
  max-width:480px;
  margin:0 auto;
  z-index:999;
  padding:10px 16px 18px;
  background:linear-gradient(135deg, #8b7bff, #7b6cff);
  border-bottom:1px solid rgba(255,255,255,0.28);
  box-shadow:
    0 8px 18px rgba(0,0,0,0.14),
    inset 0 1px 0 rgba(255,255,255,0.35);
  border-bottom-left-radius:24px;
  border-bottom-right-radius:24px;
}

.page{
  padding-top:95px;
}

.header-bar{
  display:grid;
  grid-template-columns:44px 1fr 44px;
  align-items:center;
  gap:8px;
  width:100%;
}

.icon-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.12));
  color:#ffffff;
  border:1px solid rgba(255,255,255,0.28);
  box-shadow:
    0 10px 24px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.35);
  font-size:20px;
  font-weight:900;
}

.header-title{
  text-align:center;
  font-size:22px;
  font-weight:900;
  margin:0;
  letter-spacing:.8px;
  color:#ffffff;
  text-shadow:0 2px 10px rgba(0,0,0,0.18);
}

.report-card{
  width:100%;
  background:linear-gradient(180deg, #faf9ff 0%, #f2efff 100%);
  border:1px solid var(--card-border);
  border-radius:30px;
  padding:18px 16px;
  box-shadow:var(--card-shadow);
  margin-bottom:16px;
}

label{
  display:block;
  margin:12px 0 7px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

textarea{
  width:100%;
  border:none;
  background:linear-gradient(180deg, #ffffff 0%, #fbfbff 100%);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px 14px;
  font-size:16px;
  font-weight:700;
  min-height:260px;
  resize:vertical;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.95), 0 4px 12px rgba(17,24,39,0.04);
}

.btn{
  width:100%;
  border:none;
  border-radius:20px;
  padding:16px 16px;
  margin-top:14px;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

.btn-primary{
  color:#ffffff;
  background:linear-gradient(135deg,#6a5cff,#8b7bff);
  box-shadow:0 14px 28px rgba(106,92,255,0.26), inset 0 1px 0 rgba(255,255,255,0.28);
}

.btn-secondary{
  color:var(--primary);
  background:linear-gradient(180deg, #ffffff 0%, #f3f0ff 100%);
  border:1px solid #e8e3ff;
  box-shadow:0 10px 20px rgba(17,24,39,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
}

.btn-good{
  color:#172100;
  background:linear-gradient(135deg,var(--green1),var(--green2));
  box-shadow:0 14px 28px rgba(125,255,178,0.26), inset 0 1px 0 rgba(255,255,255,0.55);
}

.msg{
  min-height:18px;
  margin-top:12px;
  text-align:center;
  font-size:14px;
  color:#ffffff;
  font-weight:800;
  text-shadow:0 1px 3px rgba(0,0,0,0.14);
}

.hidden{
  display:none !important;
}
</style>
</head>

<body>
<div class="app">

  <div class="sticky-topbar">
    <div class="header-bar">
      <button class="icon-btn" onclick="goBack()">⬅️</button>
      <h2 class="header-title">TEXT TO PDF</h2>
      <button class="icon-btn" onclick="clearText()">🧹</button>
    </div>
  </div>

  <div class="page">
    <div class="report-card">
      <label>Paste Text / Report</label>
      <textarea id="textData" placeholder="Paste your text here...."></textarea>

      <button class="btn btn-good" id="convertBtn" onclick="createPDF()">Convert to PDF</button>

      <button class="btn btn-secondary hidden" id="downloadBtn" onclick="downloadPDF()">⬇️ Download PDF</button>

      <button class="btn btn-primary hidden" id="shareBtn" onclick="sharePDF()">📤 Share PDF</button>
    </div>

    <div class="msg" id="statusMsg"></div>
  </div>

</div>

<script>
let pdfBlob = null;
let pdfUrl = "";
let pdfFileName = "text-report.pdf";

function showStatus(text){
  document.getElementById("statusMsg").textContent = text;
}

function goBack(){
  if(history.length > 1){
    history.back();
  }else{
    location.href = "report.html";
  }
}

function clearText(){
  document.getElementById("textData").value = "";
  document.getElementById("downloadBtn").classList.add("hidden");
  document.getElementById("shareBtn").classList.add("hidden");
  pdfBlob = null;
  pdfUrl = "";
  showStatus("");
}

function createPDF(){
  if(!window.jspdf || !window.jspdf.jsPDF){
    showStatus("PDF library not loaded. Internet on karke try karo.");
    return;
  }

  const text = document.getElementById("textData").value.trim();

  if(!text){
    showStatus("Please paste text first.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");

  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();

  const marginX = 14;
  let y = 18;

  doc.setFont("helvetica", "bold");
  doc.setFontSize(16);
  doc.text("TEXT TO PDF REPORT", pageWidth / 2, y, { align:"center" });

  y += 8;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(9);
  doc.text("Created: " + new Date().toLocaleString(), pageWidth / 2, y, { align:"center" });

  y += 10;

  doc.setDrawColor(106, 92, 255);
  doc.line(marginX, y, pageWidth - marginX, y);

  y += 10;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(12);

  const lines = doc.splitTextToSize(text, pageWidth - marginX * 2);

  lines.forEach(line => {
    if(y > pageHeight - 18){
      doc.addPage();
      y = 18;
    }
    doc.text(line, marginX, y);
    y += 7;
  });

  pdfBlob = doc.output("blob");
  pdfUrl = URL.createObjectURL(pdfBlob);

  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");

  pdfFileName = `text-report-${yyyy}-${mm}-${dd}-${hh}-${min}.pdf`;

  document.getElementById("downloadBtn").classList.remove("hidden");
  document.getElementById("shareBtn").classList.remove("hidden");

  showStatus("✅ PDF Created Successfully");
}

function downloadPDF(){
  if(!pdfBlob){
    showStatus("Please convert to PDF first.");
    return;
  }

  const link = document.createElement("a");
  link.href = pdfUrl;
  link.download = pdfFileName;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  showStatus("✅ PDF downloaded. Check Downloads folder.");
}

async function sharePDF(){
  if(!pdfBlob){
    showStatus("Please convert to PDF first.");
    return;
  }

  const file = new File([pdfBlob], pdfFileName, { type:"application/pdf" });

  try{
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({
        title:"Text Report PDF",
        text:"Sharing PDF report",
        files:[file]
      });
      showStatus("✅ Share opened");
    }else if(navigator.share){
      await navigator.share({
        title:"Text Report PDF",
        text:"PDF created. Please download and share from Downloads."
      });
      showStatus("Sharing file not supported here. Download PDF and share manually.");
    }else{
      showStatus("Share not supported. Download PDF and share manually.");
    }
  }catch(error){
    showStatus("Share cancelled or failed.");
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY ACTIVITY</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#6a5cff,#8b7bff);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      box-sizing:border-box;
    }
    .card{
      width:100%;
      max-width:380px;
      background:#ffffff;
      border-radius:24px;
      padding:28px 20px;
      text-align:center;
      box-shadow:0 20px 40px rgba(0,0,0,.18);
    }
    h1{
      margin:0 0 8px;
      font-size:28px;
      color:#141b2d;
    }
    p{
      margin:0 0 22px;
      color:#667085;
      font-size:15px;
      line-height:1.5;
    }
    .btn{
      border:none;
      border-radius:16px;
      padding:16px 22px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(135deg,#a7f06b,#7dffb2);
      color:#172100;
      width:100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MY ACTIVITY</h1>
    <p id="pageText">Easy Report Saving System</p>
    <button class="btn" id="downloadBtn" onclick="downloadApp()">Download App</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const isUpdateMode = params.get("mode") === "update";

    const pageText = document.getElementById("pageText");
    const downloadBtn = document.getElementById("downloadBtn");

    if (isUpdateMode) {
      pageText.textContent = "New version available. Tap below to update your app.";
      downloadBtn.textContent = "Update Now";
    } else {
      pageText.textContent = "Easy Report Saving System";
      downloadBtn.textContent = "Download App";
    }

    function downloadApp(){
      window.location.href = "https://github.com/roz143757-web/My-Activity-/releases/download/v4.0/MyActivity-v4.apk";
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Activity</title>
  <style>
    :root{
      --bg1:#6a5cff;
      --bg2:#8b7bff;
      --card:#f6f4ff;
      --card-border:rgba(255,255,255,0.9);
      --card-shadow:
        0 0 0 1px rgba(255,255,255,0.22),
        0 18px 35px rgba(0,0,0,0.18),
        0 28px 70px rgba(0,0,0,0.28),
        0 8px 18px rgba(103,79,255,0.18);
      --text:#141b2d;
      --muted:#667085;
      --line:#e8e6f5;
      --primary:#6a5cff;
      --green1:#a7f06b;
      --green2:#7dffb2;
      --danger:#ff5c7a;
      --warn:#ffb020;
      --input:#ffffff;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    *:focus,*:active{
      outline:none !important;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      overscroll-behavior:none;
    }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.22), transparent 18%),
        radial-gradient(circle at top right, rgba(255,255,255,0.14), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
      animation: pageFade .6s ease;
    }

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  padding:20px 16px;
  position:relative;
  display:none;
}

    .hidden{display:none !important}

    .center-wrap{
      min-height:calc(100vh - 40px);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:14px;
    }

    .app-head{
      width:100%;
      max-width:390px;
      margin:0 auto 4px;
      padding:18px 18px;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.10));
      border:1px solid rgba(255,255,255,0.28);
      box-shadow:
        0 12px 24px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align:center;
      color:#ffffff;
      animation: floatSoft 3.2s ease-in-out infinite;
    }

    .app-name{
      color:#ffffff;
      font-size:28px;
      font-weight:900;
      letter-spacing:2px;
      text-shadow:0 3px 12px rgba(0,0,0,0.30);
      margin-bottom:6px;
    }

    .app-subtitle{
      color:#ffffff;
      font-size:18px;
      font-weight:900;
      letter-spacing:.4px;
      text-shadow:0 3px 12px rgba(0,0,0,0.30);
    }

    .card{
      width:100%;
      background:linear-gradient(180deg, #faf9ff 0%, #f2efff 100%);
      border:1px solid var(--card-border);
      border-radius:34px;
      padding:28px 20px 24px;
      box-shadow:var(--card-shadow);
      position:relative;
      overflow:hidden;
      animation: cardEnter .7s ease;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,255,255,0.95), transparent 20%),
        linear-gradient(180deg, rgba(255,255,255,0.55), transparent 28%);
      pointer-events:none;
    }

    .card::after{
      content:"";
      position:absolute;
      left:24px;
      right:24px;
      bottom:12px;
      height:22px;
      border-radius:50%;
      background:rgba(92,74,255,0.08);
      filter:blur(14px);
      pointer-events:none;
    }

    .hero-wrap{
      text-align:center;
      margin-bottom:18px;
      position:relative;
      z-index:1;
      animation: fadeUp .55s ease;
    }

    .logo-title{
      margin-bottom:6px;
    }

    .logo-title h1{
      margin:0;
      font-size:34px;
      letter-spacing:1px;
      font-weight:900;
      color:var(--text);
      text-shadow:0 1px 0 rgba(255,255,255,0.75);
    }

    .section-title{
      margin:0 0 6px;
      font-size:34px;
      letter-spacing:1px;
      font-weight:900;
      text-align:center;
      color:var(--text);
      position:relative;
      z-index:1;
      text-shadow:0 1px 0 rgba(255,255,255,0.75);
    }

    label{
      display:block;
      margin:12px 0 7px;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      position:relative;
      z-index:1;
      animation: fadeUp .65s ease;
    }

    input{
      width:100%;
      border:none;
      background:linear-gradient(180deg, #ffffff 0%, #fbfbff 100%);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px 14px;
      font-size:16px;
      font-weight:700;
      position:relative;
      z-index:1;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.95), 0 4px 12px rgba(17,24,39,0.04);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      animation: fadeUp .72s ease;
    }

    input:focus{
      transform:translateY(-1px);
      border-color:#b8adff;
      box-shadow:
        0 10px 22px rgba(93,76,255,0.10),
        inset 0 1px 0 rgba(255,255,255,1);
    }

    input::placeholder{
      color:#a1a7b8;
      font-weight:700;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:20px;
      padding:16px 16px;
      margin-top:14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
      position:relative;
      z-index:1;
      animation: fadeUp .78s ease;
    }

    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.6;cursor:not-allowed}

    .btn:hover{
      filter:brightness(1.02);
    }

    .btn-primary{
      color:#172100;
      background:linear-gradient(135deg,var(--green1),var(--green2));
      box-shadow:0 14px 28px rgba(125,255,178,0.26), inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 18px 34px rgba(125,255,178,0.30), inset 0 1px 0 rgba(255,255,255,0.55);
    }

    .btn-secondary{
      color:var(--primary);
      background:linear-gradient(180deg, #ffffff 0%, #f3f0ff 100%);
      border:1px solid #e8e3ff;
      box-shadow:0 10px 20px rgba(17,24,39,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .btn-secondary:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 24px rgba(17,24,39,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .msg{
      min-height:18px;
      margin-top:10px;
      text-align:center;
      font-size:13px;
      color:#6b7280;
      position:relative;
      z-index:1;
    }

    .popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.22);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:2000;
    }

    .popup.show{
      display:flex;
      animation: popupFade .2s ease;
    }

    .popup-card{
      width:100%;
      max-width:340px;
      background:linear-gradient(180deg, #faf9ff 0%, #f3efff 100%);
      color:var(--text);
      border:1px solid rgba(255,255,255,0.95);
      border-radius:30px;
      padding:24px;
      text-align:center;
      box-shadow:0 28px 70px rgba(0,0,0,0.20), 0 12px 30px rgba(93,76,255,0.14);
      position:relative;
      overflow:hidden;
      animation: popupUp .22s ease;
    }

    .popup-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.95), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.45), transparent 28%);
      pointer-events:none;
    }

    .popup-circle{
      width:76px;
      height:76px;
      border-radius:50%;
      background:linear-gradient(135deg,#11b978,#18d18b);
      margin:0 auto 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:34px;
      font-weight:900;
      box-shadow:0 14px 30px rgba(17,185,120,0.28), inset 0 1px 0 rgba(255,255,255,0.45);
      position:relative;
      z-index:1;
    }

    .popup-card h3{
      margin:0 0 8px;
      font-size:22px;
      color:var(--text);
      position:relative;
      z-index:1;
    }

    .popup-card p{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.5;
      white-space:pre-wrap;
      position:relative;
      z-index:1;
      font-weight:700;
    }

    .loading-dots{
      display:inline-flex;
      gap:6px;
      margin-top:2px;
      position:relative;
      z-index:1;
    }

    .loading-dots span{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--primary);
      animation:blink 1s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2){animation-delay:.15s}
    .loading-dots span:nth-child(3){animation-delay:.30s}

    .splash-screen{
      position:fixed;
      inset:0;
      z-index:5000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.22), transparent 18%),
        radial-gradient(circle at top right, rgba(255,255,255,0.14), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      transition:opacity .35s ease, visibility .35s ease;
    }

    .splash-screen.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .splash-box{
      width:100%;
      max-width:390px;
      padding:28px 20px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.10));
      border:1px solid rgba(255,255,255,0.28);
      box-shadow:
        0 14px 28px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align:center;
      color:#ffffff;
      animation:splashPop .6s ease;
    }

    .splash-logo{
      font-size:32px;
      font-weight:900;
      letter-spacing:2px;
      text-shadow:0 4px 14px rgba(0,0,0,0.28);
      animation:splashGlow 1.5s ease-in-out infinite alternate;
    }

    .splash-text{
      margin-top:10px;
      font-size:18px;
      font-weight:900;
      letter-spacing:.4px;
      text-shadow:0 3px 12px rgba(0,0,0,0.28);
    }

    .splash-dots{
      display:inline-flex;
      gap:8px;
      margin-top:20px;
    }

    .splash-dots span{
      width:9px;
      height:9px;
      border-radius:50%;
      background:#ffffff;
      opacity:.35;
      animation:splashDot 1s infinite ease-in-out;
    }

    .splash-dots span:nth-child(2){animation-delay:.15s}
    .splash-dots span:nth-child(3){animation-delay:.30s}

    @keyframes blink{
      0%, 80%, 100%{opacity:.25; transform:translateY(0)}
      40%{opacity:1; transform:translateY(-4px)}
    }

    @keyframes pageFade{
      from{opacity:.0}
      to{opacity:1}
    }

    @keyframes cardEnter{
      from{opacity:0; transform:translateY(18px) scale(.985)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(10px)}
      to{opacity:1; transform:translateY(0)}
    }

    @keyframes popupFade{
      from{opacity:0}
      to{opacity:1}
    }

    @keyframes popupUp{
      from{opacity:0; transform:translateY(12px) scale(.98)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    @keyframes floatSoft{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-3px)}
    }

    @keyframes splashPop{
      from{opacity:0; transform:scale(.92) translateY(12px)}
      to{opacity:1; transform:scale(1) translateY(0)}
    }

    @keyframes splashGlow{
      from{transform:scale(1); text-shadow:0 4px 14px rgba(0,0,0,0.28)}
      to{transform:scale(1.03); text-shadow:0 6px 18px rgba(255,255,255,0.18), 0 4px 14px rgba(0,0,0,0.28)}
    }

    @keyframes splashDot{
      0%, 80%, 100%{opacity:.35; transform:translateY(0)}
      40%{opacity:1; transform:translateY(-5px)}
    }
  </style>
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <div class="splash-box">
      <div class="splash-logo">MY ACTIVITY</div>
      <div class="splash-text">Easy Report Saving System</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-card">
      <div class="popup-circle" id="popupCircle">✓</div>
      <h3 id="popupTitle">Success</h3>
      <p id="popupText">Done</p>
      <div class="loading-dots hidden" id="loadingDots">
        <span></span><span></span><span></span>
      </div>
      <button class="btn btn-primary" id="popupOkBtn">OK</button>
    </div>
  </div>

  <div class="app">
    <div class="center-wrap">
      <div class="app-head">
        <div class="app-name">MY ACTIVITY</div>
        <div class="app-subtitle">Easy Report Saving System</div>
      </div>

      <div class="card">
        <div id="loginView">
          <div class="hero-wrap">
            <div class="logo-title">
              <h1><b>LOGIN</b></h1>
            </div>
          </div>

          <label>Mobile Number</label>
          <input type="tel" id="loginMobile" placeholder="Enter 10-digit mobile number" maxlength="10" inputmode="numeric" pattern="[0-9]*" />

          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter 6-digit password" maxlength="6" inputmode="numeric" pattern="[0-9]*" />

          <button class="btn btn-primary" id="loginBtn">Login</button>
          <button class="btn btn-secondary" id="openCreateBtn">Create Account</button>

          <div class="msg" id="loginMsg"></div>
        </div>

        <div id="signupView" class="hidden">
          <div class="hero-wrap">
            <h2 class="section-title"><b>Create Account</b></h2>
          </div>

          <label>Mobile Number</label>
          <input type="tel" id="signupMobile" placeholder="Enter 10-digit mobile number" maxlength="10" inputmode="numeric" pattern="[0-9]*" />

          <label>Create Password</label>
          <input type="password" id="signupPassword" placeholder="Enter 6-digit password" maxlength="6" inputmode="numeric" pattern="[0-9]*" />

          <label>Confirm Password</label>
          <input type="password" id="signupConfirmPassword" placeholder="Confirm 6-digit password" maxlength="6" inputmode="numeric" pattern="[0-9]*" />

          <button class="btn btn-primary" id="createBtn">Create</button>
          <button class="btn btn-secondary" id="backToLoginBtn">Back to Login</button>

          <div class="msg" id="signupMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAywuz35rfyqnUsMy6sgCSqYFzZUuPl1n8",
      authDomain: "my-activity-f1bb0.firebaseapp.com",
      projectId: "my-activity-f1bb0",
      storageBucket: "my-activity-f1bb0.firebasestorage.app",
      messagingSenderId: "354523125344",
      appId: "1:354523125344:web:6aede87ba0fee2774ed505"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    await setPersistence(auth, browserLocalPersistence);

    const splashScreen = document.getElementById("splashScreen");

    const loginView = document.getElementById("loginView");
    const signupView = document.getElementById("signupView");

    const loginMobile = document.getElementById("loginMobile");
    const loginPassword = document.getElementById("loginPassword");
    const loginBtn = document.getElementById("loginBtn");
    const openCreateBtn = document.getElementById("openCreateBtn");
    const loginMsg = document.getElementById("loginMsg");

    const signupMobile = document.getElementById("signupMobile");
    const signupPassword = document.getElementById("signupPassword");
    const signupConfirmPassword = document.getElementById("signupConfirmPassword");
    const createBtn = document.getElementById("createBtn");
    const backToLoginBtn = document.getElementById("backToLoginBtn");
    const signupMsg = document.getElementById("signupMsg");

    const popup = document.getElementById("popup");
    const popupTitle = document.getElementById("popupTitle");
    const popupText = document.getElementById("popupText");
    const popupOkBtn = document.getElementById("popupOkBtn");
    const popupCircle = document.getElementById("popupCircle");
    const loadingDots = document.getElementById("loadingDots");

    let popupAction = null;
    let hasCheckedAuthState = false;

    function hideSplash(){
      splashScreen.classList.add("hide");
      setTimeout(() => {
        splashScreen.style.display = "none";
      }, 400);
    }

function showAppUI(){
  document.querySelector(".app").style.display = "block";
}

    function pushSignupHistory(){
      history.pushState({ page: "signup" }, "");
    }

    function showMsg(el, text, color = ""){
      el.textContent = text;
      el.style.color = color || "#6b7280";
    }

    function showLoginView(fromBack = false){
      signupView.classList.add("hidden");
      loginView.classList.remove("hidden");
      showMsg(signupMsg, "");
      if(!fromBack && history.state && history.state.page === "signup"){
        history.back();
      }
    }

    function showSignupView(){
      loginView.classList.add("hidden");
      signupView.classList.remove("hidden");
      showMsg(loginMsg, "");
      pushSignupHistory();
    }

    function openPopup(title, text, onOk = null, mode = "normal"){
      popupTitle.textContent = title;
      popupText.textContent = text;
      popup.classList.add("show");
      popupAction = onOk;

      if(mode === "loading"){
        popupCircle.textContent = "⏳";
        popupOkBtn.classList.add("hidden");
        loadingDots.classList.remove("hidden");
      } else {
        popupCircle.textContent = title === "Error" ? "!" : "✓";
        popupOkBtn.classList.remove("hidden");
        loadingDots.classList.add("hidden");
      }
    }

    function closePopup(){
      popup.classList.remove("show");
      popupAction = null;
    }

    popupOkBtn.addEventListener("click", () => {
      popup.classList.remove("show");
      if(typeof popupAction === "function"){
        popupAction();
      }
      popupAction = null;
    });

    function normalizeMobile(value){
      return (value || "").replace(/[^\d]/g, "").slice(0, 10);
    }

    function normalizeSixDigit(value){
      return (value || "").replace(/[^\d]/g, "").slice(0, 6);
    }

    function validateMobile(mobile){
      return /^[6-9]\d{9}$/.test(mobile);
    }

    function validateSixDigitPassword(password){
      return /^\d{6}$/.test(password);
    }

    function mobileToEmail(mobile){
      return `${mobile}@myactivity.app`;
    }

    function friendlyAuthError(code){
      switch(code){
        case "auth/email-already-in-use": return "This mobile number already has an account";
        case "auth/invalid-credential": return "Wrong mobile number or password";
        case "auth/user-not-found": return "Account not found";
        case "auth/wrong-password": return "Wrong password";
        case "auth/too-many-requests": return "Too many attempts. Please try again later";
        case "auth/network-request-failed": return "Network problem";
        case "auth/weak-password": return "Password is too weak";
        case "auth/invalid-email": return "Invalid mobile number";
        default: return "Something went wrong";
      }
    }

    function bindNumericOnly(input, maxLength, nextInput = null, hideKeyboardOnDone = false){
      input.addEventListener("input", () => {
        input.value = input.value.replace(/[^\d]/g, "").slice(0, maxLength);

        if(input.value.length === maxLength){
          if(nextInput){
            nextInput.focus();
          } else if(hideKeyboardOnDone){
            input.blur();
          }
        }
      });
    }

    bindNumericOnly(loginMobile, 10, loginPassword, false);
    bindNumericOnly(loginPassword, 6, null, true);

    bindNumericOnly(signupMobile, 10, signupPassword, false);
    bindNumericOnly(signupPassword, 6, signupConfirmPassword, false);
    bindNumericOnly(signupConfirmPassword, 6, null, true);

    openCreateBtn.addEventListener("click", showSignupView);
    backToLoginBtn.addEventListener("click", () => showLoginView());

    window.addEventListener("popstate", () => {
      if(!signupView.classList.contains("hidden")){
        showLoginView(true);
      }
    });

    loginBtn.addEventListener("click", async () => {
      const mobile = normalizeMobile(loginMobile.value);
      const password = normalizeSixDigit(loginPassword.value);

      loginMobile.value = mobile;
      loginPassword.value = password;

      if(!validateMobile(mobile)){
        openPopup("Error", "Enter a valid 10-digit mobile number");
        return;
      }

      if(!validateSixDigitPassword(password)){
        openPopup("Error", "Password must be exactly 6 digits");
        return;
      }

      loginBtn.disabled = true;
      showMsg(loginMsg, "");
      openPopup("Please Wait", "Checking your login details...", null, "loading");

      try{
        const email = mobileToEmail(mobile);
        await signInWithEmailAndPassword(auth, email, password);

        closePopup();
        openPopup("Success", "Login Successfully", () => {
          location.replace("report.html");
        });
      } catch(error){
        closePopup();
        openPopup("Error", friendlyAuthError(error.code));
      } finally {
        loginBtn.disabled = false;
      }
    });

    createBtn.addEventListener("click", async () => {
      const mobile = normalizeMobile(signupMobile.value);
      const password = normalizeSixDigit(signupPassword.value);
      const confirmPassword = normalizeSixDigit(signupConfirmPassword.value);

      signupMobile.value = mobile;
      signupPassword.value = password;
      signupConfirmPassword.value = confirmPassword;

      if(!validateMobile(mobile)){
        openPopup("Error", "Enter a valid 10-digit mobile number");
        return;
      }

      if(!validateSixDigitPassword(password)){
        openPopup("Error", "Create password must be exactly 6 digits");
        return;
      }

      if(!validateSixDigitPassword(confirmPassword)){
        openPopup("Error", "Confirm password must be exactly 6 digits");
        return;
      }

      if(password !== confirmPassword){
        openPopup("Error", "Confirm password does not match");
        return;
      }

      createBtn.disabled = true;
      showMsg(signupMsg, "");
      openPopup("Please Wait", "Creating your account...", null, "loading");

      try{
        const email = mobileToEmail(mobile);
        const cred = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", cred.user.uid), {
          uid: cred.user.uid,
          mobile,
          email,
          createdAt: new Date().toISOString()
        });

        await signOut(auth);

        closePopup();
        openPopup(
          "Success",
          "Account created successfully.\nLogin now",
          () => {
            showLoginView();
            loginMobile.value = mobile;
            loginPassword.value = "";
            signupMobile.value = "";
            signupPassword.value = "";
            signupConfirmPassword.value = "";
          }
        );
      } catch(error){
        closePopup();
        openPopup("Error", friendlyAuthError(error.code));
      } finally {
        createBtn.disabled = false;
      }
    });

    onAuthStateChanged(auth, (user) => {
      if(hasCheckedAuthState) return;
      hasCheckedAuthState = true;

      setTimeout(() => {
        if(user){
          location.replace("report.html");
        } else {
          showAppUI();
          hideSplash();
        }
      }, 1200);
    });
  </script>
</body>
</html>
